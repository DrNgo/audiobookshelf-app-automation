name: Check upstream commit

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: check-upstream-release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # The fork we build and ship. .upstream-version pins an exact commit on
      # UPSTREAM_BRANCH; this job bumps it whenever that branch advances.
      UPSTREAM_REPOSITORY: DrNgo/audiobookshelf-app
      UPSTREAM_BRANCH: master
      GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Resolve latest fork commit
        id: latest_commit
        run: |
          latest_sha="$(gh api "repos/${UPSTREAM_REPOSITORY}/commits/${UPSTREAM_BRANCH}" --jq '.sha')"
          if [ -z "${latest_sha}" ] || [ "${latest_sha}" = "null" ]; then
            echo "::error::could not resolve HEAD of ${UPSTREAM_REPOSITORY}@${UPSTREAM_BRANCH}"
            exit 1
          fi
          echo "sha=${latest_sha}" >> "${GITHUB_OUTPUT}"

      - name: Read pinned commit
        id: pinned_commit
        run: echo "sha=$(tr -d '[:space:]' < .upstream-version)" >> "${GITHUB_OUTPUT}"

      - name: Compare commits
        id: compare
        run: |
          if [ "${{ steps.latest_commit.outputs.sha }}" = "${{ steps.pinned_commit.outputs.sha }}" ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Open bump pull request
        if: steps.compare.outputs.changed == 'true'
        env:
          PINNED_SHA: ${{ steps.pinned_commit.outputs.sha }}
          LATEST_SHA: ${{ steps.latest_commit.outputs.sha }}
        run: |
          set -euo pipefail
          short_sha="${LATEST_SHA:0:12}"
          branch_name="bot/bump-upstream-${short_sha}"

          git config user.name  "audiobookshelf-app bot"
          git config user.email "audiobookshelf-app-bot@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "${branch_name}" >/dev/null 2>&1; then
            # The branch already exists. If an open PR exists too, the gate is
            # already pending and there is nothing to do. Otherwise a prior run
            # pushed the branch but failed to open the PR — fall through and
            # create it so the build gate always has a PR to run on. (The bump
            # commit is already on the branch, so no new commit is needed.)
            if [ -n "$(gh pr list --head "${branch_name}" --base main --state open --json number --jq '.[0].number // empty')" ]; then
              echo "open PR already exists for ${branch_name}; nothing to do"
              exit 0
            fi
            echo "branch ${branch_name} exists without an open PR; creating it"
          else
            git checkout -b "${branch_name}"
            printf '%s\n' "${LATEST_SHA}" > .upstream-version
            git add .upstream-version
            git commit -m "bump upstream audiobookshelf-app to ${short_sha}"
            git push --set-upstream origin "${branch_name}"
          fi

          pull_request_body=$(printf 'Fork branch `%s` advanced to [`%s`](https://github.com/%s/commit/%s) (was `%s`).\n\nThe **Deploy to TestFlight** build gate will build this PR and, once the build is green, merge it automatically. The merge then triggers a deploy that reuses the build instead of rebuilding.' "${UPSTREAM_BRANCH}" "${short_sha}" "${UPSTREAM_REPOSITORY}" "${LATEST_SHA}" "${PINNED_SHA:0:12}")
          gh pr create --base main --head "${branch_name}" --title "Bump audiobookshelf-app to ${short_sha}" --body "${pull_request_body}"
